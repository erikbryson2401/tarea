version: '3.8'
services:
  app:
    build: .
    expose:
      - "5000"
    depends_on:
      - db
    restart: unless-stopped
    env_file: .env

  db:
    image: postgres:15.6
    env_file: .env
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    restart: unless-stopped

volumes:
  db_data:
